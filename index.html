<html>
  <head>
    <script type="module">
      import QrScanner from './qr-scanner.min.js';

      const videoElem = document.querySelector('video');

      const qrScanner = new QrScanner(
          videoElem,
          result => _check(result),
          { /* your options or returnDetailedScanResult: true if you're not specifying any other options */ },
      );

      qrScanner.start();


      let pending = false;
      async function _check(result) {
        if (pending) return;
        pending = true;


        const resp = await fetch("https://ekasa.financnasprava.sk/mdu/api/v1/opd/receipt/find", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ receiptId: result.data }),
        });
        const respData = await resp.json();

        console.log("results", resp)

        
        document.querySelector('#obchod').innerText = "Obchod: " + respData?.receipt?.organization?.name;
        document.querySelector('#cena').innerText = "Cena:" + respData?.receipt?.totalPrice;
        
        
        
        
        pending = false;
      }
      


    </script>
  </head>
  <body>
    <video></video>
    <div id="obchod"></div>
    <div id="cena"></div>
  </body>
</html>
